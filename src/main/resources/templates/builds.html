<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои сборки | PC Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand mb-0 h1 text-decoration-none fw-bold" href="/">PC Builder</a>
        <a class="btn btn-outline-light btn-sm fw-medium" href="/catalog">Вернуться в каталог</a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4 fw-bold">Мои сохраненные сборки</h2>

    <div class="card shadow-sm rounded-4 overflow-hidden border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th class="py-3 px-4 w-25">Сборка</th>
                        <th class="py-3 w-50">Комплектующие</th>
                        <th class="py-3 w-25">Общая стоимость</th>
                        <th class="py-3 text-center">Действие</th> </tr>
                    </thead>
                    <tbody>
                    <tr th:each="build : ${builds}">
                        <td class="px-4">
                            <h5 class="fw-bold text-primary mb-1" th:text="${build.name}">Игровой ПК</h5>
                            <span class="badge bg-secondary" th:text="'ID: ' + ${build.id}">ID: 1</span>
                        </td>

                        <td>
                            <ul class="list-unstyled mb-0 small" style="column-count: 2; column-gap: 40px;">
                                <li th:if="${build.cpu != null}" class="mb-1"><strong>CPU:</strong> <span th:text="${build.cpu.brand + ' ' + build.cpu.name}"></span></li>
                                <li th:if="${build.motherboard != null}" class="mb-1"><strong>M/B:</strong> <span th:text="${build.motherboard.brand + ' ' + build.motherboard.name}"></span></li>
                                <li th:if="${build.gpu != null}" class="mb-1"><strong>GPU:</strong> <span th:text="${build.gpu.brand + ' ' + build.gpu.name}"></span></li>
                                <li th:if="${build.ram != null}" class="mb-1"><strong>RAM:</strong> <span th:text="${build.ram.brand + ' ' + build.ram.name}"></span></li>
                                <li th:if="${build.cooler != null}" class="mb-1"><strong>Охлад:</strong> <span th:text="${build.cooler.brand + ' ' + build.cooler.name}"></span></li>
                                <li th:if="${build.storage != null}" class="mb-1"><strong>SSD:</strong> <span th:text="${build.storage.brand + ' ' + build.storage.name}"></span></li>
                                <li th:if="${build.psu != null}" class="mb-1"><strong>БП:</strong> <span th:text="${build.psu.brand + ' ' + build.psu.name}"></span></li>
                                <li th:if="${build.pcCase != null}" class="mb-1"><strong>Корпус:</strong> <span th:text="${build.pcCase.brand + ' ' + build.pcCase.name}"></span></li>
                            </ul>
                        </td>

                        <td class="text-success fw-bold fs-5 text-nowrap"
                            th:with="
                                p1=${build.cpu != null ? build.cpu.price : 0},
                                p2=${build.motherboard != null ? build.motherboard.price : 0},
                                p3=${build.gpu != null ? build.gpu.price : 0},
                                p4=${build.ram != null ? build.ram.price : 0},
                                p5=${build.cooler != null ? build.cooler.price : 0},
                                p6=${build.storage != null ? build.storage.price : 0},
                                p7=${build.psu != null ? build.psu.price : 0},
                                p8=${build.pcCase != null ? build.pcCase.price : 0}
                            "
                            th:text="${p1 + p2 + p3 + p4 + p5 + p6 + p7 + p8 + ' ₽'}">
                            0 ₽
                        </td>

                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-danger px-3"
                                    th:onclick="'deleteBuild(' + ${build.id} + ', this)'">
                                Удалить
                            </button>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(builds)}">
                        <td colspan="4" class="text-center text-muted py-5">
                            <h5 class="fw-normal">Вы еще не сохранили ни одной сборки.</h5>
                            <a href="/catalog" class="btn btn-primary mt-3 px-4 shadow-sm">Собрать свой первый ПК</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    async function deleteBuild(id, buttonElement) {
        if (!confirm("Вы уверены, что хотите удалить эту сборку?")) {
            return;
        }

        try {
            const response = await fetch('/api/builds/' + id, {
                method: 'DELETE'
            });

            if (response.ok) {
                const row = buttonElement.closest('tr');
                row.remove();

                if (document.querySelectorAll('tbody tr').length === 0) {
                    location.reload();
                }
            } else {
                alert("Не удалось удалить сборку.");
            }
        } catch (error) {
            alert("Ошибка сети при удалении.");
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
