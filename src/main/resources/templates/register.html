<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация | PC Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div>
    <div class="mb-3">
        <a href="/" class="btn btn-sm btn-outline-secondary text-decoration-none shadow-sm">
            &larr; Назад в каталог
        </a>
    </div>

    <div class="card shadow p-4" style="width: 400px;">
        <h3 class="text-center mb-4">Регистрация</h3>

        <div th:if="${param.error}" class="alert alert-danger">
            Такой Email уже занят!
        </div>

        <form action="/register" method="post">
            <div class="mb-3">
                <label class="form-label">Email адрес</label>
                <input type="email" name="email" class="form-control" required placeholder="name@example.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
        </form>

        <div class="text-center mt-3">
            <a href="/login" class="text-decoration-none">Уже есть аккаунт? Войти</a>
        </div>
    </div>
</div>

</body>
</html>
